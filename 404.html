<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>rect | 404 - Link Not Found</title>
    <style>
        :root { 
            --bg: #030712; 
            --card: #111827; 
            --text: #f9fafb; 
            --accent: #f43f5e; /* Reddish accent for error */
            --link: #60a5fa;
        }
        body { 
            font-family: 'Inter', system-ui, -apple-system, sans-serif; 
            background: var(--bg); 
            color: var(--text); 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            height: 100vh; 
            margin: 0; 
            overflow: hidden;
        }
        .container { 
            background: var(--card); 
            padding: 3.5rem; 
            border-radius: 2rem; 
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5); 
            border: 1px solid rgba(255,255,255,0.05); 
            text-align: center; 
            max-width: 400px;
            position: relative;
        }
        .error-code { 
            font-size: 6rem; 
            font-weight: 900; 
            color: var(--accent); 
            line-height: 1;
            margin-bottom: 1rem;
            letter-spacing: -4px;
            opacity: 0.8;
        }
        h1 { 
            font-size: 1.5rem; 
            margin-bottom: 1rem; 
            font-weight: 700;
        }
        p { 
            color: #9ca3af; 
            line-height: 1.6; 
            font-size: 1rem;
            margin-bottom: 2rem;
        }
        .home-link { 
            display: inline-block; 
            padding: 0.75rem 1.5rem; 
            background: rgba(96, 165, 250, 0.1); 
            color: var(--link); 
            text-decoration: none; 
            border-radius: 0.75rem; 
            font-weight: 600; 
            transition: all 0.2s ease;
            border: 1px solid rgba(96, 165, 250, 0.2);
        }
        .home-link:hover { 
            background: var(--link); 
            color: #000; 
            transform: translateY(-2px);
        }
        /* Subtle background glow */
        .glow {
            position: absolute;
            width: 150px;
            height: 150px;
            background: var(--accent);
            filter: blur(80px);
            opacity: 0.15;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: -1;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="glow"></div>
        <div class="error-code">404</div>
        <h1>Link Not Found</h1>
        <p>The short link you followed doesn't exist or has been moved by the owner.</p>
        <a href="../" class="home-link">← Back to homepage</a>
    </div>
</body>
</html>
