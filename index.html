<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>rect |  to redirect wherever.</title>
    <style>
        :root { --bg: #030712; --card: #111827; --text: #f9fafb; --accent: #60a5fa; }
        body { font-family: 'Inter', system-ui, sans-serif; background: var(--bg); color: var(--text); display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .container { background: var(--card); padding: 3rem; border-radius: 2rem; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5); border: 1px solid rgba(255,255,255,0.05); text-align: center; max-width: 450px; }
        .logo { font-size: 3rem; font-weight: 800; color: var(--accent); letter-spacing: -2px; margin-bottom: 0.5rem; }
        p { color: #9ca3af; line-height: 1.6; font-size: 1.1rem; }
        .btn { display: inline-block; margin-top: 1.5rem; padding: 0.75rem 1.5rem; background: var(--accent); color: #000; text-decoration: none; border-radius: 0.75rem; font-weight: 600; transition: 0.2s; }
        .btn:hover { transform: translateY(-2px); opacity: 0.9; }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">rect</div>
        <p>An ultra-fast, serverless URL shortener powered by GitHub Pages.</p>

    </div>

</html>
